version: '3.8'

services:
  mysql:
    image: mysql:5.7
    container_name: storeai-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-storeai_doctor}
    volumes:
      - ./docker/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: storeai-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_URL: jdbc:mysql://mysql:3306/storeai_doctor?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-none}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
      GUMROAD_PRO_URL: ${GUMROAD_PRO_URL:-https://gumroad.com/l/storeai-pro}
      GUMROAD_ENTERPRISE_URL: ${GUMROAD_ENTERPRISE_URL:-https://gumroad.com/l/storeai-enterprise}
      GUMROAD_PRO_PRODUCT_ID: ${GUMROAD_PRO_PRODUCT_ID:-pro}
      GUMROAD_ENTERPRISE_PRODUCT_ID: ${GUMROAD_ENTERPRISE_PRODUCT_ID:-enterprise}

  nginx:
    image: nginx:alpine
    container_name: storeai-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: storeai-frontend
    depends_on:
      - backend