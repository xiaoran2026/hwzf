server:
  port: 8080

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3307/storeai_doctor?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  mail:
    host: ${MAIL_HOST:smtp.example.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

deepseek:
  api-key: ${DEEPSEEK_API_KEY:sk-d3d8b384f607417aa35309bb807a1dce}
  base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
  model: ${DEEPSEEK_MODEL:deepseek-chat}
  max-tokens: 8000

jwt:
  secret: ${JWT_SECRET:storeai-doctor-super-secret-key-2024-must-be-at-least-256-bits-long-for-hs256-algorithm}
  expiration: ${JWT_EXPIRATION:86400000}

gumroad:
  pro-url: ${GUMROAD_PRO_URL:https://5463483454943.gumroad.com/l/kqiyao}
  starter-url: ${GUMROAD_STARTER_URL:https://5463483454943.gumroad.com/l/hypgzt}
  pro-product-id: ${GUMROAD_PRO_PRODUCT_ID:kqiyao}
  starter-product-id: ${GUMROAD_STARTER_PRODUCT_ID:hypgzt}
  webhook-token: ${GUMROAD_WEBHOOK_TOKEN:}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
